    <style>
      /* Preloader CSS */
      .loader-wrapper {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 10000;
          background-color: #1a1a1a;
          display: flex;
          justify-content: center;
          align-items: center;
          transition: opacity 0.5s ease;
      }
      .loader-wrapper.hidden {
          opacity: 0;
          pointer-events: none;
          visibility: hidden;
      }
      .custom-loader {
          width: 50px;
          height: 50px;
          border: 3px solid rgba(255, 255, 255, 0.3);
          border-radius: 50%;
          border-top-color: #00d084; /* Professional Green */
          animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
          to { transform: rotate(360deg); }
      }
    </style>
    <script>
      // Global loader hiding logic
      window.hidePageLoader = function() {
        var loader = document.querySelector('.loader-wrapper');
        if (loader && !loader.classList.contains('hidden')) {
          setTimeout(function() {
            loader.classList.add('hidden');
          }, 300); // Small grace period for layout to settle
        }
      };

      // Fallback: hide loader after 5 seconds no matter what
      window.addEventListener('load', function() {
        setTimeout(window.hidePageLoader, 4000);
      });
    </script>
  </head>
  <body>
    <!-- Full page preloader -->
    <div class="loader-wrapper">
      <div class="custom-loader"></div>
    </div>

    <!-- React app (Vite module) -->
    <script type="module" src="src/main.jsx"></script>
